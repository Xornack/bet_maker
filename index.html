<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bet Maker</title>
    <!-- Trunk will automatically inject the compiled wasm here -->
    <link data-trunk rel="rust" data-wasm-opt="2" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            overflow: hidden;
            background-color: #2b2b2b;
        }
        body {
            /* Fill horizontally; cap vertical height to the viewport so the
               canvas does not stretch on very tall screens. */
            height: 100vh;
            max-height: 100dvh;
        }
        canvas {
            width: 100vw;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <!-- The id must match the id used in src/main.rs -->
    <canvas id="the_canvas_id"></canvas>
</body>
</html>
